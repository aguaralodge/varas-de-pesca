<div class="admin-productos-wrap">
  <h2>Administrar productos</h2>

  <div id="editBadge" style="display:none; margin-bottom:10px; font-weight:bold; color:#b45309;">
    Estás editando un producto
  </div>

  <input id="pName" placeholder="Nombre" />
  <input id="pPrice" type="number" placeholder="Precio" />
  <input id="pStock" type="number" placeholder="Stock" />
  <input id="pCat" placeholder="Categoría" />
  <textarea id="pDesc" placeholder="Descripción completa"></textarea>
  <input id="pImg" type="file" accept="image/*" />

  <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:10px;">
    <button id="btnSave" type="button">Guardar producto</button>
    <button id="btnCancelEdit" type="button" style="display:none;">Cancelar edición</button>
  </div>

  <div id="msg" style="margin-top:10px;"></div>

  <hr style="margin:30px 0;">

  <section>
    <h3>Productos cargados</h3>
    <div id="productosAdminList">
      <p>Cargando productos...</p>
    </div>
  </section>
</div>

<!-- VISOR DE IMAGEN -->
<div id="imgModal" style="
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  z-index:9999;
  align-items:center;
  justify-content:center;
  padding:20px;
">
  <div style="
    position:relative;
    max-width:90vw;
    max-height:90vh;
    background:#fff;
    border-radius:14px;
    padding:14px;
    box-shadow:0 10px 30px rgba(0,0,0,.35);
  ">
    <button id="imgModalClose" type="button" style="
      position:absolute;
      top:8px;
      right:8px;
      width:34px;
      height:34px;
      border:none;
      border-radius:50%;
      cursor:pointer;
      font-size:18px;
      font-weight:bold;
      background:#111;
      color:#fff;
    ">×</button>

    <img id="imgModalImage" src="" alt="Vista ampliada" style="
      display:block;
      max-width:80vw;
      max-height:80vh;
      object-fit:contain;
      border-radius:10px;
    ">
  </div>
</div>

<script>
function getAdminPassword() {
  return "AGUARA26";
}

const $ = (id) => document.getElementById(id);

let editingProductId = null;

// GUARDAR / ACTUALIZAR
$("btnSave").addEventListener("click", async () => {
  const msg = $("msg");

  const name = $("pName").value.trim();
  const price = Number($("pPrice").value || 0);
  const stock = Number($("pStock").value || 0);
  const category = $("pCat").value.trim();
  const description = $("pDesc").value.trim();
  const file = $("pImg").files[0];

  if (!name) return msg.textContent = "Falta nombre";
  if (price < 0) return msg.textContent = "Precio inválido";
  if (stock < 0) return msg.textContent = "Stock inválido";

  let imageBase64 = null;
  let imageMime = null;

  if (file) {
    imageMime = file.type || "image/jpeg";
    const dataUrl = await fileToBase64(file);
    imageBase64 = dataUrl.split(",")[1];
  }

  msg.textContent = editingProductId ? "Actualizando..." : "Guardando...";

  const payload = {
    name, price, stock, category, description
  };

  if (editingProductId) {
    payload.id = editingProductId;
    payload.keepExistingImage = true;
    if (imageBase64) {
      payload.imageBase64 = imageBase64;
      payload.imageMime = imageMime;
    }
  } else {
    if (imageBase64) {
      payload.imageBase64 = imageBase64;
      payload.imageMime = imageMime;
    }
  }

  const endpoint = editingProductId
    ? "/api/products/update"
    : "/api/products/create";

  const r = await fetch(endpoint, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-admin-password": getAdminPassword()
    },
    body: JSON.stringify(payload)
  });

  const j = await r.json();

  if (!r.ok) {
    msg.textContent = "Error: " + (j.error || "falló");
    return;
  }

  msg.textContent = editingProductId
    ? "Producto actualizado ✅"
    : "Producto creado ✅";

  resetForm();
  loadProducts();
});

// CANCELAR EDICIÓN
$("btnCancelEdit").addEventListener("click", () => {
  resetForm();
  $("msg").textContent = "Edición cancelada";
});

// LISTAR PRODUCTOS
async function loadProducts() {
  const box = $("productosAdminList");
  box.innerHTML = "Cargando...";

  const r = await fetch("/api/products/list");
  const j = await r.json();

  const products = Array.isArray(j) ? j : (j.data || j.products || []);

  if (!products.length) {
    box.innerHTML = "No hay productos";
    return;
  }

  box.innerHTML = products.map(p => `
    <div style="
      border:1px solid #ddd;
      padding:12px;
      margin-bottom:12px;
      border-radius:12px;
      display:flex;
      gap:14px;
      align-items:flex-start;
      flex-wrap:wrap;
    ">
      <div
        onclick="${p.image_url ? `openImageModal('${String(p.image_url).replaceAll("\\", "\\\\").replaceAll("'", "\\'")}')` : ""}"
        style="
          width:120px;
          height:120px;
          border:1px solid #ddd;
          border-radius:10px;
          background:#f7f7f7;
          display:flex;
          align-items:center;
          justify-content:center;
          overflow:hidden;
          cursor:${p.image_url ? "pointer" : "default"};
          flex-shrink:0;
        "
        title="${p.image_url ? "Click para ampliar" : "Sin imagen"}"
      >
        ${
          p.image_url
            ? `<img
                src="${p.image_url}"
                alt="${escapeHtml(p.name)}"
                style="
                  width:100%;
                  height:100%;
                  object-fit:contain;
                  display:block;
                  background:#fff;
                "
              >`
            : `<span style="font-size:12px; color:#666;">Sin imagen</span>`
        }
      </div>

      <div style="flex:1; min-width:220px;">
        <strong>${escapeHtml(p.name)}</strong><br>
        $${Number(p.price).toLocaleString()}<br>
        Stock: ${p.stock}<br>
        Categoría: ${escapeHtml(p.category || "-")}<br>
        Descripción: ${escapeHtml(p.description || "-")}
      </div>

      <div style="display:flex; flex-direction:column; gap:8px;">
        <button onclick="editProduct('${p.id}')" type="button">Editar</button>
        <button onclick="deleteProduct('${p.id}')" type="button">Borrar</button>
      </div>
    </div>
  `).join("");
}

// EDITAR
window.editProduct = async function(id) {
  const r = await fetch("/api/products/list");
  const j = await r.json();
  const products = Array.isArray(j) ? j : (j.data || j.products || []);
  const p = products.find(x => String(x.id) === String(id));

  if (!p) return;

  editingProductId = p.id;

  $("pName").value = p.name;
  $("pPrice").value = p.price;
  $("pStock").value = p.stock;
  $("pCat").value = p.category || "";
  $("pDesc").value = p.description || "";
  $("pImg").value = "";

  $("btnSave").textContent = "Actualizar producto";
  $("btnCancelEdit").style.display = "inline-block";
  $("editBadge").style.display = "block";

  window.scrollTo({ top: 0, behavior: "smooth" });
};

// BORRAR
window.deleteProduct = async function(id) {
  if (!confirm("¿Borrar producto?")) return;

  const r = await fetch("/api/products/delete", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-admin-password": getAdminPassword()
    },
    body: JSON.stringify({ id })
  });

  const j = await r.json();

  if (!r.ok) {
    $("msg").textContent = "Error al borrar";
    return;
  }

  $("msg").textContent = "Producto borrado ✅";
  loadProducts();
};

// RESET
function resetForm() {
  editingProductId = null;

  $("pName").value = "";
  $("pPrice").value = "";
  $("pStock").value = "";
  $("pCat").value = "";
  $("pDesc").value = "";
  $("pImg").value = "";

  $("btnSave").textContent = "Guardar producto";
  $("btnCancelEdit").style.display = "none";
  $("editBadge").style.display = "none";
}

// MODAL DE IMAGEN
window.openImageModal = function(src) {
  $("imgModalImage").src = src;
  $("imgModal").style.display = "flex";
};

function closeImageModal() {
  $("imgModal").style.display = "none";
  $("imgModalImage").src = "";
}

$("imgModalClose").addEventListener("click", closeImageModal);

$("imgModal").addEventListener("click", (e) => {
  if (e.target.id === "imgModal") {
    closeImageModal();
  }
});

// UTIL
function fileToBase64(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.readAsDataURL(file);
  });
}

function escapeHtml(str) {
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

// INICIO
loadProducts();
</script>
