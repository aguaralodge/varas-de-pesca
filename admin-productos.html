<div class="admin-productos-wrap">
  <h2>Administrar productos</h2>

  <div id="editBadge" style="display:none; margin-bottom:10px; font-weight:bold; color:#b45309;">
    Estás editando un producto
  </div>

  <input id="pName" placeholder="Nombre" />
  <input id="pPrice" type="number" placeholder="Precio" />
  <input id="pStock" type="number" placeholder="Stock" />
  <input id="pCat" placeholder="Categoría" />
  <textarea id="pDesc" placeholder="Descripción completa"></textarea>
  <input id="pImg" type="file" accept="image/*" />

  <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:10px;">
    <button id="btnSave" type="button">Guardar producto</button>
    <button id="btnCancelEdit" type="button" style="display:none;">Cancelar edición</button>
  </div>

  <div id="msg" style="margin-top:10px;"></div>

  <hr style="margin:30px 0;">

  <section>
    <h3>Productos cargados</h3>
    <div id="productosAdminList">
      <p>Cargando productos...</p>
    </div>
  </section>
</div>

<!-- MODAL PARA VER IMAGEN GRANDE -->
<div id="imgModal" style="
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.78);
  z-index:99999;
  align-items:center;
  justify-content:center;
  padding:20px;
">
  <div style="
    position:relative;
    max-width:92vw;
    max-height:92vh;
    background:#fff;
    border-radius:14px;
    padding:14px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
  ">
    <button id="imgModalClose" type="button" style="
      position:absolute;
      top:8px;
      right:8px;
      width:36px;
      height:36px;
      border:none;
      border-radius:50%;
      cursor:pointer;
      font-size:20px;
      font-weight:bold;
      background:#111;
      color:#fff;
      line-height:1;
    ">×</button>

    <img id="imgModalImage" src="" alt="Vista ampliada" style="
      display:block;
      max-width:85vw;
      max-height:85vh;
      object-fit:contain;
      border-radius:10px;
      background:#fff;
    ">
  </div>
</div>

<script>
function getAdminPassword() {
  return "AGUARA26";
}

const $ = (id) => document.getElementById(id);
let editingProductId = null;

/* =========================
   GUARDAR / ACTUALIZAR
========================= */
$("btnSave").addEventListener("click", async () => {
  const msg = $("msg");

  const name = $("pName").value.trim();
  const price = Number($("pPrice").value || 0);
  const stock = Number($("pStock").value || 0);
  const category = $("pCat").value.trim();
  const description = $("pDesc").value.trim();
  const file = $("pImg").files[0];

  if (!name) {
    msg.textContent = "Falta nombre";
    return;
  }

  if (Number.isNaN(price) || price < 0) {
    msg.textContent = "Precio inválido";
    return;
  }

  if (!Number.isInteger(stock) || stock < 0) {
    msg.textContent = "Stock inválido";
    return;
  }

  let imageBase64 = null;
  let imageMime = null;

  if (file) {
    imageMime = file.type || "image/jpeg";
    const dataUrl = await fileToBase64(file);
    imageBase64 = dataUrl.split(",")[1];
  }

  msg.textContent = editingProductId ? "Actualizando..." : "Guardando...";

  const payload = {
    name,
    price,
    stock,
    category,
    description
  };

  if (editingProductId) {
    payload.id = editingProductId;
    payload.keepExistingImage = true;

    if (imageBase64 && imageMime) {
      payload.imageBase64 = imageBase64;
      payload.imageMime = imageMime;
    }
  } else {
    if (imageBase64 && imageMime) {
      payload.imageBase64 = imageBase64;
      payload.imageMime = imageMime;
    }
  }

  const endpoint = editingProductId
    ? "/api/products/update"
    : "/api/products/create";

  let r, j;

  try {
    r = await fetch(endpoint, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-admin-password": getAdminPassword()
      },
      body: JSON.stringify(payload)
    });
  } catch (e) {
    msg.textContent = "Error de red: " + String(e);
    return;
  }

  try {
    j = await r.json();
  } catch {
    msg.textContent = "La respuesta del servidor no se pudo leer";
    return;
  }

  if (!r.ok) {
    msg.textContent = "Error: " + (j.error || "falló");
    return;
  }

  msg.textContent = editingProductId
    ? "Producto actualizado ✅"
    : "Producto creado ✅";

  resetForm();
  await loadProducts();
});

/* =========================
   CANCELAR EDICIÓN
========================= */
$("btnCancelEdit").addEventListener("click", () => {
  resetForm();
  $("msg").textContent = "Edición cancelada";
});

/* =========================
   LISTAR PRODUCTOS
========================= */
async function loadProducts() {
  const box = $("productosAdminList");
  box.innerHTML = "<p>Cargando productos...</p>";

  let r, j;

  try {
    r = await fetch("/api/products/list");
  } catch (e) {
    box.innerHTML = `<p>Error de red al cargar productos: ${escapeHtml(String(e))}</p>`;
    return;
  }

  try {
    j = await r.json();
  } catch {
    box.innerHTML = "<p>No se pudo leer la respuesta de productos</p>";
    return;
  }

  const products = Array.isArray(j) ? j : (j.data || j.products || []);

  if (!products.length) {
    box.innerHTML = "<p>No hay productos</p>";
    return;
  }

  box.innerHTML = products.map(p => {
    const id = String(p.id ?? "");
    const name = escapeHtml(p.name || "");
    const price = Number(p.price || 0).toLocaleString("es-AR");
    const stock = escapeHtml(String(p.stock ?? 0));
    const category = escapeHtml(p.category || "-");
    const description = escapeHtml(p.description || "-");
    const imageUrl = p.image_url || "";

    return `
      <div style="
        border:1px solid #ddd;
        padding:12px;
        margin-bottom:12px;
        border-radius:12px;
        display:flex;
        gap:14px;
        align-items:flex-start;
        flex-wrap:wrap;
      ">
        <div
          class="product-thumb"
          data-img="${escapeAttr(imageUrl)}"
          style="
            width:120px;
            height:120px;
            border:1px solid #ddd;
            border-radius:10px;
            background:#f7f7f7;
            display:flex;
            align-items:center;
            justify-content:center;
            overflow:hidden;
            cursor:${imageUrl ? "pointer" : "default"};
            flex-shrink:0;
          "
          title="${imageUrl ? "Click para ampliar" : "Sin imagen"}"
        >
          ${
            imageUrl
              ? `<img
                  src="${escapeAttr(imageUrl)}"
                  alt="${escapeAttr(p.name || "Producto")}"
                  style="
                    width:100%;
                    height:100%;
                    object-fit:contain;
                    display:block;
                    background:#fff;
                  "
                >`
              : `<span style="font-size:12px; color:#666;">Sin imagen</span>`
          }
        </div>

        <div style="flex:1; min-width:220px;">
          <strong>${name}</strong><br>
          $${price}<br>
          Stock: ${stock}<br>
          Categoría: ${category}<br>
          Descripción: ${description}
        </div>

        <div style="display:flex; flex-direction:column; gap:8px;">
          <button type="button" onclick="editProduct('${escapeJs(id)}')">Editar</button>
          <button type="button" onclick="deleteProduct('${escapeJs(id)}')">Borrar</button>
        </div>
      </div>
    `;
  }).join("");

  document.querySelectorAll(".product-thumb").forEach(el => {
    el.addEventListener("click", () => {
      const src = el.dataset.img;
      if (src) openImageModal(src);
    });
  });
}

/* =========================
   EDITAR
========================= */
window.editProduct = async function(id) {
  let r, j;

  try {
    r = await fetch("/api/products/list");
    j = await r.json();
  } catch {
    $("msg").textContent = "No se pudo cargar el producto para editar";
    return;
  }

  const products = Array.isArray(j) ? j : (j.data || j.products || []);
  const p = products.find(x => String(x.id) === String(id));

  if (!p) {
    $("msg").textContent = "No se encontró el producto";
    return;
  }

  editingProductId = p.id;

  $("pName").value = p.name || "";
  $("pPrice").value = p.price || 0;
  $("pStock").value = p.stock || 0;
  $("pCat").value = p.category || "";
  $("pDesc").value = p.description || "";
  $("pImg").value = "";

  $("btnSave").textContent = "Actualizar producto";
  $("btnCancelEdit").style.display = "inline-block";
  $("editBadge").style.display = "block";
  $("msg").textContent = "Modo edición activado";

  window.scrollTo({ top: 0, behavior: "smooth" });
};

/* =========================
   BORRAR
========================= */
window.deleteProduct = async function(id) {
  const confirmar = confirm("¿Borrar producto?");
  if (!confirmar) return;

  let r, j;

  try {
    r = await fetch("/api/products/delete", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-admin-password": getAdminPassword()
      },
      body: JSON.stringify({ id })
    });
  } catch (e) {
    $("msg").textContent = "Error de red al borrar: " + String(e);
    return;
  }

  try {
    j = await r.json();
  } catch {
    $("msg").textContent = "No se pudo leer la respuesta al borrar";
    return;
  }

  if (!r.ok) {
    $("msg").textContent = "Error al borrar: " + (j.error || "falló");
    return;
  }

  if (String(editingProductId) === String(id)) {
    resetForm();
  }

  $("msg").textContent = "Producto borrado ✅";
  await loadProducts();
};

/* =========================
   MODAL DE IMAGEN
========================= */
function openImageModal(src) {
  $("imgModalImage").src = src;
  $("imgModal").style.display = "flex";
}

function closeImageModal() {
  $("imgModal").style.display = "none";
  $("imgModalImage").src = "";
}

$("imgModalClose").addEventListener("click", closeImageModal);

$("imgModal").addEventListener("click", (e) => {
  if (e.target.id === "imgModal") {
    closeImageModal();
  }
});

/* =========================
   RESET
========================= */
function resetForm() {
  editingProductId = null;

  $("pName").value = "";
  $("pPrice").value = "";
  $("pStock").value = "";
  $("pCat").value = "";
  $("pDesc").value = "";
  $("pImg").value = "";

  $("btnSave").textContent = "Guardar producto";
  $("btnCancelEdit").style.display = "none";
  $("editBadge").style.display = "none";
}

/* =========================
   UTILS
========================= */
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function escapeHtml(str) {
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function escapeAttr(str) {
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll('"', "&quot;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll("'", "&#039;");
}

function escapeJs(str) {
  return String(str)
    .replaceAll("\\", "\\\\")
    .replaceAll("'", "\\'");
}

/* =========================
   INICIO
========================= */
loadProducts();
</script>
